services:
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8001
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8001
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      BACKEND_PORT: 8001
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./backend
    command: rq worker default
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    depends_on:
      - postgres
      - redis

  scheduler:
    build:
      context: ./backend
    command: python -m app.workers.scheduler
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: it_inventory
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
